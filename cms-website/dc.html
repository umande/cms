<body>
    <div class="container panel-title">
        <button type="button" class="btn btn-primary panel-title" data-bs-toggle="modal" data-bs-target="#myModal">Click
            to Add Students</button>
        <div class="modal " id="myModal">
            <div class="modal-dialog ">
                <div class="modal-content ">
                    <div class="modal-header">
                        <h5 class="h5 fw-bold" style="text-align:center;">Add Students to this batch</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal">X</button>
                    </div>

                    <div class="modal-body">
                        <div class="container">


                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="">Type of Car</label>
                                        <input type="text" class="form-control">
                                    </div>
                                    <div class="form-group">
                                        <label for="">Car Modal</label>
                                        <input type="text" class="form-control">

                                        <div class="form-group">
                                            <label for="">Car Number</label>
                                            <input type="text" class="form-control">
                                        </div>
                                        <div class="form-group">
                                            <label for="">Services</label>
                                            <select name="" id="" class="form-control">
                                                <option value="">---choose services--</option>
                                                <option value="">2</option>
                                                <option value="">3</option>
                                                <option value="">4</option>
                                                <option value="">5</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="">Exctra Services</label>
                                        <select name="" id="" class="form-control">
                                            <option value="">---choose services--</option>
                                            <option value="">2</option>
                                            <option value="">3</option>
                                            <option value="">4</option>
                                            <option value="">5</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label for="">Date</label>
                                        <input type="text" class="form-control">
                                    </div>
                                    <div class="form-group">
                                        
                                        <textarea name="" id="" cols="25" rows="5" class="form-control">More </textarea>
                                    </div>

                                    
                                </div>
                                <div class="form-group">
                                        
                                    <button type="submit" class="btn btn-info form-control">Request</button>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
