<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        body { font: normal 10pt Helvetica, Arial; }
       #map { width: 100%; height: 500px; border: 0px; padding: 0px; }
       </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7nkdhgPZsOlAC4b3IWDAvTm3TSIaef7w&callback=initMap"    type="text/javascript"></script>
    <script type="text/javascript" src="./js/jquery-3.4.1.min.js"></script>
    <script>
 var icon = new google.maps.MarkerImage("http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
  new google.maps.Size(50, 50), new google.maps.Point(0, 0),
  new google.maps.Point(16, 32));
  var center = null;
  var map = null;
  var currentPopup;
  var bounds = new google.maps.LatLngBounds();
  function addMarker(lat, lng, info) {
        var pt = new google.maps.LatLng(lat, lng, info);
        bounds.extend(pt);
        var marker = new google.maps.Marker({
            position: pt,
            icon: icon,
            map: map
        });
        var popup = new google.maps.InfoWindow({
            content: info,
            maxWidth: 300
        });

   google.maps.event.addListener(marker, "click", function() {
        if (currentPopup != null) {
        currentPopup.close();
        currentPopup = null;
        }
        popup.open(map, marker);
        currentPopup = popup;
 });
 google.maps.event.addListener(popup, "closeclick", function() {
        map.panTo(center);
         currentPopup = null;
 });
 }
 function initMap() {
     map = new google.maps.Map(document.getElementById("map"), {
        center: new google.maps.LatLng(0, 0),
        zoom: 8,
        mapTypeId: google.maps.MapTypeId.ROADMAP,
        mapTypeControl: false,
        mapTypeControlOptions: {
        style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR
        },
        navigationControl: true,
        navigationControlOptions: {
        style: google.maps.NavigationControlStyle.SMALL
  }
        });


 $.getJSON('googlescript.php', function(items)
     {
     for (var i = 0; i < items.length; i++) {
        (function(item) {
            //  addMarker(item.lat, item.lng);
             addMarker(item.lat, item.lng, item.name + ":  " + item.desc);
            })(items[i]);
        }
});

 center = bounds.getCenter();
  map.fitBounds(bounds);
 }

</script>
</head>
<body onload="initMap()">
   <div id="map"></div> 
   <!-- <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7nkdhgPZsOlAC4b3IWDAvTm3TSIaef7w&callback=initMap"></script>			 -->
</body>
</html>
